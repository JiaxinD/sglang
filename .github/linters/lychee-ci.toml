no_progress = true
verbose = "warn"
timeout = 20
max_concurrency = 8
retry_wait_time = 2
max_retries = 2

# CI should validate external links over the network.
offline = false
scheme = ["http", "https"]

exclude_path = [
  "^docs/_build/",
]

exclude = [
  "http://localhost",
  "https://localhost",
  "http://127.0.0.1",
]
